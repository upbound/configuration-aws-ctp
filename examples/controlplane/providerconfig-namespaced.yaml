# Namespaced (Crossplane v2) ProviderConfig required by the v2 managed
# resources (*.aws.m.upbound.io) that this composition produces. Mirrors the
# credentials of the cluster-scoped ProviderConfig.aws.upbound.io/default.
# Created in the `default` namespace where the composed namespaced MRs live.
apiVersion: aws.m.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  namespace: default
spec:
  credentials:
    source: Upbound
    upbound:
      webIdentity:
        roleARN: arn:aws:iam::656321468224:role/ai-playground
