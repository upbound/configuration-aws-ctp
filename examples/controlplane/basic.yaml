apiVersion: aws.platform.upbound.io/v1alpha1
kind: ControlPlane
metadata:
  name: my-control-plane
spec:
  parameters:
    id: my-control-plane
    region: us-west-2
    version: "1.34"
    nodes:
      count: 3
      instanceType: t3.medium
    accessConfig:
      authenticationMode: API_AND_CONFIG_MAP
      bootstrapClusterCreatorAdminPermissions: true
