          version: v1.16.3
    status:
      atProvider:
        state: deployed
  - apiVersion: helm.m.crossplane.io/v1beta1
    kind: Release
    metadata:
      name: test-cp-knative-operator
      namespace: default
      annotations:
        crossplane.io/composition-resource-name: knative-operator-release
    spec:
      forProvider:
        chart:
          name: knative-operator
          repository: https://knative.github.io/operator
          version: v1.21.1
    status:
      atProvider:
        state: deployed
  - apiVersion: kubernetes.m.crossplane.io/v1alpha1
    kind: Object
    metadata:
      name: test-cp-knative-serving-cr
      namespace: default
      annotations:
        crossplane.io/composition-resource-name: knative-serving-cr
    spec:
      providerConfigRef:
        name: test-cp
    status:
      atProvider:
        manifest:
          status:
            conditions:
            - type: Ready
              status: "True"
  assertResources:
  - apiVersion: kubernetes.m.crossplane.io/v1alpha1
    kind: Object
    metadata:
      name: test-cp-upbound-runtime-config
    spec:
      forProvider:
        manifest:
          spec:
            capabilities:
