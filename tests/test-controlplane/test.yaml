# Composition tests for the ControlPlane Python composition.
# Each test renders the composition against a ControlPlane XR fixture and
# asserts that specific composed resources are produced.
---
apiVersion: meta.dev.upbound.io/v1alpha1
kind: CompositionTest
metadata:
  name: basic
spec:
  compositionPath: apis/ctp/composition.yaml
  xrdPath: apis/ctp/definition.yaml
  validate: true
  timeoutSeconds: 60
  xr:
    apiVersion: aws.platform.upbound.io/v1alpha1
    kind: ControlPlane
    metadata:
      name: test-cp
    spec:
      parameters:
        id: test-cp
        region: us-east-1
        version: "1.34"
        nodes:
          count: 2
          instanceType: t3.small
  assertResources:
  - apiVersion: aws.platform.upbound.io/v1alpha1
    kind: Network
    metadata:
      name: test-cp
  - apiVersion: aws.platform.upbound.io/v1alpha1
    kind: EKS
    metadata:
      name: test-cp
  - apiVersion: helm.m.crossplane.io/v1beta1
    kind: Release
    metadata:
      name: test-cp-uxp
    spec:
      forProvider:
        chart:
          version: "2.2.1-up.1"
        values:
          upbound:
            manager:
              metering:
                podSecurityContext:
                  fsGroup: 65532
                  fsGroupChangePolicy: OnRootMismatch
  - apiVersion: protection.crossplane.io/v1beta1
    kind: Usage
    metadata:
      name: test-cp-usage-release-eks
    spec:
      of:
        kind: EKS
      by:
        kind: Release
  - apiVersion: protection.crossplane.io/v1beta1
    kind: Usage
    metadata:
      name: test-cp-usage-eks-network
    spec:
      of:
        kind: Network
      by:
        kind: EKS
---
apiVersion: meta.dev.upbound.io/v1alpha1
kind: CompositionTest
metadata:
  name: backup-enabled
spec:
  compositionPath: apis/ctp/composition.yaml
  xrdPath: apis/ctp/definition.yaml
  validate: true
  timeoutSeconds: 60
  xr:
    apiVersion: aws.platform.upbound.io/v1alpha1
    kind: ControlPlane
    metadata:
      name: test-cp
    spec:
      parameters:
        id: test-cp
        region: us-east-1
        version: "1.34"
        nodes:
          count: 2
          instanceType: t3.small
        backup:
          enabled: "yes"
          location: arn:aws:s3:::my-backup-bucket
  assertResources:
  - apiVersion: s3.aws.m.upbound.io/v1beta1
    kind: Bucket
    metadata:
      name: test-cp-backup-bucket
    spec:
      forProvider:
        region: us-east-1
  - apiVersion: eks.aws.m.upbound.io/v1beta1
    kind: Cluster
    metadata:
      name: test-cp-observe
  - apiVersion: kubernetes.m.crossplane.io/v1alpha1
    kind: Object
    metadata:
      name: test-cp-backup-config
    spec:
      forProvider:
        manifest:
          spec:
            objectStorage:
              credentials:
                source: InjectedIdentity
  - apiVersion: kubernetes.m.crossplane.io/v1alpha1
    kind: Object
    metadata:
      name: test-cp-backup-rbac
  - apiVersion: kubernetes.m.crossplane.io/v1alpha1
    kind: Object
    metadata:
      name: test-cp-backup-rbac-binding
---
